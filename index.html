<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lingo ♡ — Shoujo Language Translator</title>
  <meta name="description" content="Lingo is a dreamy, shoujo-styled real-time language translator with voice input, supporting 35+ languages." />
  <meta name="theme-color" content="#ff8fab" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Background orbs -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
  </div>

  <!-- Floating petals -->
  <div class="petals" aria-hidden="true">
    <span class="petal" style="--x:8%;  --delay:0s;  --dur:12s; --size:10px;"></span>
    <span class="petal" style="--x:18%; --delay:2s;  --dur:15s; --size:8px;"></span>
    <span class="petal" style="--x:33%; --delay:5s;  --dur:11s; --size:12px;"></span>
    <span class="petal" style="--x:50%; --delay:1s;  --dur:14s; --size:9px;"></span>
    <span class="petal" style="--x:65%; --delay:7s;  --dur:13s; --size:11px;"></span>
    <span class="petal" style="--x:78%; --delay:3s;  --dur:16s; --size:7px;"></span>
    <span class="petal" style="--x:90%; --delay:9s;  --dur:10s; --size:13px;"></span>
    <span class="petal" style="--x:24%; --delay:6s;  --dur:18s; --size:8px;"></span>
    <span class="petal" style="--x:56%; --delay:4s;  --dur:12s; --size:10px;"></span>
    <span class="petal" style="--x:83%; --delay:11s; --dur:15s; --size:9px;"></span>
  </div>

  <main class="app-wrapper">

    <!-- ── Header ── -->
    <header class="header">
      <div class="header-top">
        <div class="logo">
          <div class="logo-icon" aria-hidden="true">🌸</div>
          <span class="logo-text">Lingo</span>
        </div>

        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark theme" title="Toggle theme">
          <span class="toggle-track">
            <span class="toggle-thumb">
              <span class="toggle-icon toggle-sun">☀️</span>
              <span class="toggle-icon toggle-moon">🌙</span>
            </span>
          </span>
        </button>
      </div>

      <h1 class="header__title">Speak Every Language<br><em>of the Heart</em> ♡</h1>
      <p class="header__subtitle">Voice input · 35+ languages · real-time translation</p>

      <div class="header-deco" aria-hidden="true">
        <span class="deco-star">✦</span>
        <span class="deco-heart">♡</span>
        <span class="deco-star">✦</span>
      </div>
    </header>

    <!-- ── Language Bar ── -->
    <nav class="lang-bar" aria-label="Language selection">
      <div class="lang-select-wrapper">
        <span class="lang-flag" id="source-flag">🇬🇧</span>
        <select id="source-select" aria-label="Source language"></select>
        <span class="lang-arrow">
          <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
          </svg>
        </span>
      </div>

      <button class="swap-btn" id="swap-btn" aria-label="Swap languages" title="Swap languages">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/>
        </svg>
      </button>

      <div class="lang-select-wrapper">
        <span class="lang-flag" id="target-flag">🇪🇸</span>
        <select id="target-select" aria-label="Target language"></select>
        <span class="lang-arrow">
          <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
          </svg>
        </span>
      </div>
    </nav>

    <!-- ── Translator Card ── -->
    <section class="translator-card" aria-label="Translator">

      <div class="panels">

        <!-- Source Panel -->
        <div class="panel panel--source">
          <div class="panel-top-bar">
            <span class="panel-label">✍️ Source text</span>
            <button class="mic-btn" id="mic-btn" aria-label="Click to speak" title="Voice input">
              <svg class="mic-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>
              </svg>
              <span class="mic-ripple"></span>
            </button>
          </div>

          <textarea
            id="source-text"
            placeholder="Start typing or tap 🎙 to speak…"
            aria-label="Text to translate"
            spellcheck="true"
            autofocus
          ></textarea>

          <div class="panel-footer">
            <span class="char-count" id="char-count">0 / 1000</span>
            <div class="icon-btns">
              <button class="icon-btn" id="clear-source-btn" title="Clear" aria-label="Clear source text">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
              </button>
              <button class="icon-btn" id="copy-src-btn" title="Copy source" aria-label="Copy source text">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Divider -->
        <div class="panel-divider" aria-hidden="true">
          <span class="divider-heart">♡</span>
        </div>

        <!-- Target Panel -->
        <div class="panel panel--target">
          <div class="panel-top-bar">
            <span class="panel-label">🌸 Translation</span>
          </div>

          <textarea
            id="target-text"
            placeholder="Your translation will bloom here…"
            aria-label="Translated text"
            readonly
          ></textarea>

          <div class="panel-footer">
            <span></span>
            <button class="icon-btn" id="copy-tgt-btn" title="Copy translation" aria-label="Copy translated text">
              <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
            </button>
          </div>
        </div>

      </div>

      <!-- Action Strip -->
      <div class="action-strip">
        <div class="status-pill" id="status-pill">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">Ready to translate</span>
        </div>

        <button class="translate-btn" id="translate-btn" aria-label="Translate">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"/>
          </svg>
          Translate ✿
        </button>
      </div>

    </section>

    <!-- ── Quick Phrases ── -->
    <section class="phrases-section" aria-label="Quick phrases">
      <div class="section-header">
        <h2 class="section-title">✿ Quick Phrases</h2>
      </div>
      <div class="phrases-grid" id="phrases-grid"></div>
    </section>

    <!-- ── History ── -->
    <section class="history-section" aria-label="Translation history">
      <div class="section-header">
        <h2 class="section-title">♡ Recent Translations</h2>
        <button class="clear-btn" id="clear-history-btn" aria-label="Clear history">Clear all</button>
      </div>
      <div class="history-list" id="history-list"></div>
    </section>

    <!-- ── Footer ── -->
    <footer class="footer">
      <p>Made with ♡ · Powered by <a href="https://mymemory.translated.net" target="_blank" rel="noopener">MyMemory API</a> · 35+ languages</p>
    </footer>

  </main>

  <div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <script src="script.js"></script>
</body>
</html>
